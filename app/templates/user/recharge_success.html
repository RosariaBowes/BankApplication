<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recharge Successful | Rosaria Banking</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color: #f4f6f9;">

    <div class="vh-100 d-flex justify-content-center align-items-center">

        <div class="card col-md-4 bg-white shadow p-5 border-0">

            <div class="mb-4 text-center">

                <svg xmlns="http://www.w3.org/2000/svg"
                     class="text-success"
                     width="75"
                     height="75"
                     fill="currentColor"
                     viewBox="0 0 16 16">

                    <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z" />

                    <path d="M10.97 4.97a.235.235 0 0 0-.02.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-1.071-1.05z" />

                </svg>

            </div>

            <div class="text-center">

                <h1 class="fw-bold">
                    Recharge Successful
                </h1>

                <p class="text-muted mt-3">
                    Your airtime purchase has been completed successfully.
                </p>

                <div class="bg-light rounded p-3 my-4">

                    <p class="mb-2">
                        <strong>Amount Charged:</strong>
                        £{{ amount }}
                    </p>

                    <p class="mb-0">
                        <strong>Discount Applied:</strong>
                        £{{ discount }}
                    </p>

                </div>

                <a href="{{ url_for('dashboard') }}">
                    <button class="btn btn-outline-success">
                        Back to Dashboard
                    </button>
                </a>

            </div>

        </div>

    </div>

</body>

</html>
